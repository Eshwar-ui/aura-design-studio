<!DOCTYPE html>
<html lang="en" dir="ltr" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="luxury interior designer, high-end interior design, residential design, bespoke furniture, space planning, 3d visualization, client portal">

  <!-- UNIQUE PER PAGE -->
  <title>Under Construction — Aura Design Studio</title>
  <meta name="description" content="Aura Design Studio's new collection and client collaboration portal are launching soon. Subscribe to receive exclusive spatial design insights.">
  <link rel="canonical" href="https://auradesignstudio.com/pages/coming-soon.html">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Under Construction — Aura Design Studio">
  <meta property="og:description" content="Aura Design Studio's new collection and client collaboration portal are launching soon. Subscribe to receive exclusive spatial design insights.">
  <meta property="og:image"       content="https://auradesignstudio.com/assets/images/ui/og-image.webp">
  <meta property="og:url"         content="https://auradesignstudio.com/pages/coming-soon.html">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Under Construction — Aura Design Studio">
  <meta name="twitter:description" content="Aura Design Studio's new collection and client collaboration portal are launching soon.">
  <meta name="twitter:image"       content="https://auradesignstudio.com/assets/images/ui/og-image.webp">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Under Construction — Aura Design Studio",
    "description": "Aura Design Studio's new collection and client collaboration portal are launching soon. Subscribe to receive exclusive spatial design insights.",
    "url": "https://auradesignstudio.com/pages/coming-soon.html"
  }
  </script>

  <!-- Favicon -->
  <link rel="icon"             href="../assets/images/ui/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/images/ui/apple-touch-icon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="../assets/css/output.css">
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/editorial.css">
</head>
<body class="bg-primary text-white transition-colors duration-300 font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
  
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Background Image with heavy overlay -->
  <div class="absolute inset-0 z-0">
    <img src="../assets/images/hero/hero-secondary.webp" alt="Minimalist concrete interior architecture rendering" class="w-full h-full object-cover" loading="eager" width="1200" height="800">
    <div class="absolute inset-0 bg-black/85"></div>
  </div>

  <main id="main-content" class="relative z-10 max-w-xl mx-auto px-6 text-center flex flex-col items-center gap-8 py-12" role="main">
    
    <!-- Logo -->
    <a href="index.html" class="flex items-center gap-3 text-white" aria-label="Go to homepage">
      <img src="../assets/images/ui/logo-dark.svg" alt="Aura Design Studio Logo" class="h-8 w-auto text-white" loading="eager" width="160" height="40">
    </a>

    <!-- Copy -->
    <div class="flex flex-col gap-4" data-reveal="fade-up">
      <span class="text-accent text-xs font-bold uppercase tracking-widest">Pre-launch portal</span>
      <p class="signature text-3xl md:text-4xl">See you soon</p>
      <h1 class="text-3xl md:text-5xl font-bold font-serif leading-tight">A new space, <span class="display-italic text-accent">nearly drawn.</span></h1>
      <p class="text-gray-400 text-sm leading-relaxed max-w-[42ch] mx-auto">
        We are completing our client collaboration portal and the 2026 furniture collection. Subscribe below to receive launch access.
      </p>
    </div>

    <!-- Countdown Timer Grid -->
    <div class="grid grid-cols-4 gap-4 max-w-md w-full" data-reveal="fade-up" data-delay="1">
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col items-center">
        <span class="text-2xl md:text-3xl font-serif font-bold text-accent">24</span>
        <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Days</span>
      </div>
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col items-center">
        <span class="text-2xl md:text-3xl font-serif font-bold text-accent">18</span>
        <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Hours</span>
      </div>
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col items-center">
        <span class="text-2xl md:text-3xl font-serif font-bold text-accent">45</span>
        <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Mins</span>
      </div>
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col items-center">
        <span class="text-2xl md:text-3xl font-serif font-bold text-accent">12</span>
        <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Secs</span>
      </div>
    </div>

    <!-- Subscription Box -->
    <div class="bg-white/5 border border-white/10 p-6 rounded-2xl w-full" data-reveal="fade-up" data-delay="2">
      <form class="flex flex-col gap-3" novalidate id="coming-soon-form">
        <div class="relative flex-1">
          <input type="email" id="cs-email" name="email" placeholder="Email Address" required autocomplete="email" class="w-full h-[44px] bg-black/30 border border-white/10 rounded-xl px-4 text-sm text-white outline-none focus:border-accent transition">
          <span class="form-error absolute bottom-[-18px] left-0 text-[10px] text-red-500"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-md w-full">Join VIP Sourcing Access</button>
      </form>
    </div>

    <!-- Footer link -->
    <a href="index.html" class="text-xs text-gray-500 hover:text-accent transition flex items-center gap-1.5 mt-2" data-reveal="fade-up" data-delay="3">
      ← Back to Aura Homepage
    </a>

  </main>

  <!-- Preloader -->
  <div class="preloader">
    <div class="preloader__spinner"></div>
    <span class="preloader__brand">AURA</span>
  </div>

  <!-- Scripts -->
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
